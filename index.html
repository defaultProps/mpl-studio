<script>
  function throttleCloseContextmenu(func, wait) {
    var timeout;
    var previous = 0;

    return function () {
      context = this;
      args = arguments;
      if (!timeout) {
        timeout = setTimeout(function () {
          timeout = null;
          func.apply(context, args)
        }, wait)
      }
    }
  }

  function mplCloseContextmenu() {
    // 减少DOM查询
    if (localStorage.getItem("workbenchNodeContextmenuStatus") === "open") {
      const contextmenuNode = document.querySelector('#workbenchIframeScroll iframe')?.contentWindow.document.getElementById('contextmenuMounted')

      if (contextmenuNode) {
        contextmenuNode.style.display = 'none'
        localStorage.setItem("workbenchNodeContextmenuStatus", "close")
      }
    }
  }

  document.addEventListener('contextmenu', mplCloseContextmenu)
  document.addEventListener('click', mplCloseContextmenu)
  // 滚轮事件触发频率非常高，需节流
  document.addEventListener('mousewheel', throttleCloseContextmenu(mplCloseContextmenu, 300))
</script>
